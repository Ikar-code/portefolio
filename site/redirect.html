<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lucas Rajany — Portfolio 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Segoe UI',sans-serif; }
#c { display:block; width:100vw; height:100vh; }

#crosshair {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:18px; height:18px;
  pointer-events:none; display:none;
}
#crosshair::before,#crosshair::after {
  content:''; position:absolute; background:rgba(255,255,255,0.85);
}
#crosshair::before { top:50%; left:0; width:100%; height:1.5px; transform:translateY(-50%); }
#crosshair::after  { left:50%; top:0; height:100%; width:1.5px; transform:translateX(-50%); }

#overlay {
  position:fixed; inset:0;
  background:linear-gradient(135deg,rgba(0,0,0,0.82),rgba(10,5,30,0.9));
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#fff; gap:12px; z-index:100;
}
#overlay .name {
  font-size:38px; font-weight:200; letter-spacing:0.15em; color:#fff;
}
#overlay .name span { color:#8b5cf6; font-weight:600; }
#overlay .sub {
  font-size:13px; color:rgba(255,255,255,0.45); letter-spacing:0.08em;
  text-transform:uppercase;
}
#overlay .badge {
  margin-top:4px; font-size:12px;
  background:rgba(74,197,94,0.15);
  border:1px solid rgba(74,197,94,0.4);
  color:#4ac55e; padding:4px 14px; border-radius:20px;
  letter-spacing:0.05em;
}
#overlay button {
  margin-top:16px; padding:12px 32px;
  background:rgba(139,92,246,0.2);
  border:1px solid rgba(139,92,246,0.5);
  border-radius:10px; color:#c4b5fd;
  font-size:14px; letter-spacing:0.05em; cursor:pointer;
  transition:all 0.2s;
}
#overlay button:hover { background:rgba(139,92,246,0.35); color:#fff; }
#overlay .controls {
  margin-top:8px; font-size:11px; color:rgba(255,255,255,0.3);
  line-height:2; text-align:center;
}

#hud {
  position:fixed; bottom:18px; left:50%;
  transform:translateX(-50%);
  font-size:11px; color:rgba(255,255,255,0.35);
  pointer-events:none; display:none;
  background:rgba(0,0,0,0.35);
  padding:5px 16px; border-radius:20px;
  letter-spacing:0.06em; white-space:nowrap;
}

#hint {
  position:fixed; bottom:52px; left:50%;
  transform:translateX(-50%);
  background:rgba(10,5,25,0.85);
  border:1px solid rgba(139,92,246,0.4);
  border-radius:24px; padding:7px 22px;
  color:#c4b5fd; font-size:13px;
  pointer-events:none; display:none;
  white-space:nowrap; letter-spacing:0.03em;
}

/* NPC name floating tag */
#npc-label {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%, -120px);
  background:rgba(10,5,25,0.75);
  border:1px solid rgba(139,92,246,0.3);
  border-radius:8px; padding:4px 14px;
  color:#e9d5ff; font-size:12px; font-weight:500;
  pointer-events:none; display:none;
  white-space:nowrap; letter-spacing:0.04em;
}

#dlg {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%);
  width:520px; max-width:92vw;
  background:rgba(8,5,20,0.96);
  border:1px solid rgba(139,92,246,0.35);
  border-radius:16px; padding:22px 26px;
  color:#e2e0f0; display:none; z-index:50;
  box-shadow:0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(139,92,246,0.1);
}
#dlg-header {
  display:flex; align-items:center; gap:12px; margin-bottom:12px;
}
#dlg-avatar {
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
#dlg-name {
  font-size:11px; font-weight:600; color:#a78bfa;
  letter-spacing:0.1em; text-transform:uppercase;
}
#dlg-role { font-size:11px; color:rgba(255,255,255,0.35); margin-top:2px; }
#dlg-text { font-size:13.5px; line-height:1.75; color:#ccc9e0; }
#dlg-links { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
#dlg-links a {
  font-size:12px; padding:5px 14px;
  background:rgba(139,92,246,0.12);
  border:1px solid rgba(139,92,246,0.3);
  border-radius:7px; color:#a78bfa;
  text-decoration:none; transition:all 0.18s;
}
#dlg-links a:hover { background:rgba(139,92,246,0.25); color:#e9d5ff; }
#dlg-close {
  margin-top:14px; float:right;
  font-size:12px; padding:5px 18px;
  background:transparent;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:7px; color:rgba(255,255,255,0.4);
  cursor:pointer; transition:all 0.18s;
}
#dlg-close:hover { border-color:rgba(255,255,255,0.25); color:rgba(255,255,255,0.7); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="crosshair"></div>
<div id="hud">ZQSD · avancer/reculer/strafer &nbsp;|&nbsp; Souris · regarder &nbsp;|&nbsp; E · parler &nbsp;|&nbsp; Échap · menu</div>
<div id="hint"></div>
<div id="npc-label"></div>

<div id="dlg">
  <div id="dlg-header">
    <div id="dlg-avatar"></div>
    <div>
      <div id="dlg-name"></div>
      <div id="dlg-role"></div>
    </div>
  </div>
  <div id="dlg-text"></div>
  <div id="dlg-links"></div>
  <button id="dlg-close">Fermer [E]</button>
</div>

<div id="overlay">
  <div class="name">Lucas<span>.</span>Rajany</div>
  <div class="sub">Étudiant BTS SIO SLAM · Portfolio 3D</div>
  <div class="badge">● Disponible pour un stage · Réunion</div>
  <button id="start-btn">Entrer dans la ville</button>
  <div class="controls">
    ZQSD · se déplacer &nbsp;|&nbsp; Souris · regarder<br>
    E · parler aux PNJ &nbsp;|&nbsp; Échap · menu
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderer ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Scene ─────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0xc8e8f5, 35, 100);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 14);

// ── Lights ────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff8e8, 0.75));

const sun = new THREE.DirectionalLight(0xfffbe8, 2.0);
sun.position.set(40, 60, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 160;
[-55,55].forEach(v => {
  sun.shadow.camera.left = sun.shadow.camera.bottom = -55;
  sun.shadow.camera.right = sun.shadow.camera.top = 55;
});
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x55aa55, 0.55));

// ── Ground ────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(250,250),
  new THREE.MeshLambertMaterial({ color:0x5aaa55 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Roads
function addPlane(x, z, w, d, color, y=0.01) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w,d),
    new THREE.MeshLambertMaterial({ color })
  );
  m.rotation.x = -Math.PI/2;
  m.position.set(x, y, z);
  m.receiveShadow = true;
  scene.add(m);
}
// Main roads
addPlane(0, 0, 7, 250, 0x888877);   // vertical
addPlane(0, 0, 250, 7, 0x888877);   // horizontal
addPlane(-20, 0, 5.5, 250, 0x888877); // left avenue
addPlane(20, 0, 5.5, 250, 0x888877);  // right avenue
addPlane(0, -20, 250, 5.5, 0x888877); // bottom avenue
addPlane(0, 20, 250, 5.5, 0x888877);  // top avenue

// Sidewalks
addPlane(5, 0, 2, 250, 0xccbbaa, 0.02);
addPlane(-5, 0, 2, 250, 0xccbbaa, 0.02);
addPlane(0, 5, 250, 2, 0xccbbaa, 0.02);
addPlane(0, -5, 250, 2, 0xccbbaa, 0.02);
addPlane(22.5, 0, 2, 250, 0xccbbaa, 0.02);
addPlane(-22.5, 0, 2, 250, 0xccbbaa, 0.02);
addPlane(0, 22.5, 250, 2, 0xccbbaa, 0.02);
addPlane(0, -22.5, 250, 2, 0xccbbaa, 0.02);

// Center line dashes
const dashMat = new THREE.MeshBasicMaterial({ color:0xffffff });
for (let i=-25; i<25; i+=5) {
  const d = new THREE.Mesh(new THREE.PlaneGeometry(0.2,2.5), dashMat);
  d.rotation.x = -Math.PI/2; d.position.set(0,0.02,i); scene.add(d);
  const d2 = new THREE.Mesh(new THREE.PlaneGeometry(2.5,0.2), dashMat);
  d2.rotation.x = -Math.PI/2; d2.position.set(i,0.02,0); scene.add(d2);
}

// ── Park (centre) ─────────────────────────────────────────────────
addPlane(0, 0, 9, 9, 0x66bb55, 0.03);

// Fountain base
const fb = new THREE.Mesh(
  new THREE.CylinderGeometry(1.3,1.5,0.45,24),
  new THREE.MeshLambertMaterial({ color:0xd0c8b5 })
);
fb.position.set(0,0.22,0); fb.castShadow=true; scene.add(fb);

const fw = new THREE.Mesh(
  new THREE.CylinderGeometry(1.05,1.05,0.12,24),
  new THREE.MeshLambertMaterial({ color:0x55aadd, transparent:true, opacity:0.82 })
);
fw.position.set(0,0.44,0); scene.add(fw);

const fp = new THREE.Mesh(
  new THREE.CylinderGeometry(0.11,0.14,1.2,10),
  new THREE.MeshLambertMaterial({ color:0xc0b0a0 })
);
fp.position.set(0,1.05,0); scene.add(fp);

// Fountain top dish
const ftop = new THREE.Mesh(
  new THREE.CylinderGeometry(0.4,0.3,0.18,16),
  new THREE.MeshLambertMaterial({ color:0xd0c8b5 })
);
ftop.position.set(0,1.7,0); scene.add(ftop);

// Park benches
function bench(x, z, ry) {
  const g = new THREE.Group();
  const seat = new THREE.Mesh(new THREE.BoxGeometry(1.2,0.08,0.42), new THREE.MeshLambertMaterial({ color:0x9B6A3F }));
  seat.position.y=0.52; g.add(seat);
  const back = new THREE.Mesh(new THREE.BoxGeometry(1.2,0.42,0.07), new THREE.MeshLambertMaterial({ color:0x9B6A3F }));
  back.position.set(0,0.77,-0.18); g.add(back);
  [-0.5,0.5].forEach(lx => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.52,0.42), new THREE.MeshLambertMaterial({ color:0x555555 }));
    leg.position.set(lx,0.26,0); g.add(leg);
  });
  g.rotation.y=ry; g.position.set(x,0,z);
  g.castShadow=true; scene.add(g);
}
bench(2.5,0,Math.PI/2); bench(-2.5,0,-Math.PI/2);
bench(0,2.5,Math.PI); bench(0,-2.5,0);

// ── Buildings ─────────────────────────────────────────────────────
const wallColors = [0xf2e8d8,0xe8d8c5,0xd5c8b5,0xeee0cc,0xf8f0e0,0xe2d5c0];
const roofColors = [0xcc8855,0xbb7744,0xaa6633,0xdd9966,0xc47a3a];
const winColors  = [0x6aaddd,0x4499cc,0x88bbdd,0x3388bb];

function makeBuilding(x, z, w, h, d) {
  const wc = wallColors[Math.floor(Math.random()*wallColors.length)];
  const rc = roofColors[Math.floor(Math.random()*roofColors.length)];
  const winc = winColors[Math.floor(Math.random()*winColors.length)];

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({ color:wc })
  );
  body.position.set(x, h/2, z);
  body.castShadow=true; body.receiveShadow=true;
  scene.add(body);

  // Roof ledge
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(w+0.25,0.32,d+0.25),
    new THREE.MeshLambertMaterial({ color:rc })
  );
  roof.position.set(x, h+0.16, z);
  roof.castShadow=true; scene.add(roof);

  // Windows front & back
  const rows = Math.max(1, Math.floor(h/2.2));
  const cols = Math.max(1, Math.floor(w/1.6));
  for (let r=0; r<rows; r++) {
    for (let c=0; c<cols; c++) {
      if (Math.random()<0.6) {
        const win = new THREE.Mesh(
          new THREE.PlaneGeometry(0.55,0.65),
          new THREE.MeshBasicMaterial({ color:winc, transparent:true, opacity:0.8+Math.random()*0.2 })
        );
        const wx = x - w/2 + 0.9 + c*(w/cols);
        const wy = 1.1 + r*2.1;
        win.position.set(wx, wy, z+d/2+0.01); scene.add(win);
        const win2=win.clone(); win2.position.z=z-d/2-0.01; win2.rotation.y=Math.PI; scene.add(win2);
      }
    }
  }
  // Door
  const door=new THREE.Mesh(new THREE.PlaneGeometry(0.9,1.5),new THREE.MeshBasicMaterial({ color:0x7a4a25 }));
  door.position.set(x,0.75,z+d/2+0.02); scene.add(door);
}

// City layout — positioned in the 4 quadrants away from center park
const buildings = [
  // NE quadrant
  [-11,-11,6,10,6], [-11,-11,4,6,4], [-8,-15,4,8,4], [-15,-9,4,12,4],
  [-11,-19,5,7,5], [-17,-14,4,9,4],
  // NW quadrant
  [11,-11,6,12,6], [11,-11,4,7,4], [8,-15,4,9,4], [15,-9,4,8,4],
  [11,-19,5,10,5], [17,-14,4,7,4],
  // SE quadrant
  [-11,11,6,9,6], [-11,11,4,14,4], [-8,15,4,7,4], [-15,9,4,10,4],
  [-11,19,5,8,5],
  // SW quadrant
  [11,11,6,11,6], [11,11,4,8,4], [8,15,4,10,4], [15,9,4,9,4],
  [11,19,5,7,5], [17,14,4,11,4],
  // Far buildings
  [-25,-10,5,13,5], [-25,-10,4,8,4],
  [25,-10,5,15,5], [25,-10,4,9,4],
  [-25,10,5,10,5], [25,10,5,12,5],
  [-10,-25,5,8,5], [10,-25,5,11,5],
  [-10,25,5,9,5], [10,25,5,13,5],
];
buildings.forEach(([x,z,w,h,d]) => makeBuilding(x,z,w,h,d));

// Skyscrapers
function skyscraper(x,z,h) {
  makeBuilding(x,z,6,h,6);
  const ant=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,5,6),new THREE.MeshBasicMaterial({color:0x888}));
  ant.position.set(x,h+2.5,z); scene.add(ant);
  const bl=new THREE.Mesh(new THREE.SphereGeometry(0.14,6,6),new THREE.MeshBasicMaterial({color:0xff2222}));
  bl.position.set(x,h+5.1,z); scene.add(bl); blinkLights.push(bl);
  const tl=new THREE.PointLight(0x4466ff,1.2,10); tl.position.set(x,h,z); scene.add(tl);
}
const blinkLights=[];
skyscraper(-13,-13,28); skyscraper(13,-13,32);
skyscraper(-13,13,30); skyscraper(13,13,26);

// ── Trees ─────────────────────────────────────────────────────────
function makeTree(x, z, h=3.2) {
  const trunk=new THREE.Mesh(
    new THREE.CylinderGeometry(0.12,0.18,h*0.38,7),
    new THREE.MeshLambertMaterial({ color:0x7a4f2e })
  );
  trunk.position.set(x, h*0.19, z);
  trunk.castShadow=true; scene.add(trunk);
  const cols=[0x2d7a2d,0x3a9a3a,0x4aaa40];
  for (let i=0;i<3;i++) {
    const r=(3-i)*0.52+0.28;
    const fh=r*1.5;
    const fol=new THREE.Mesh(
      new THREE.ConeGeometry(r,fh,9),
      new THREE.MeshLambertMaterial({ color:cols[i] })
    );
    fol.position.set(x, h*0.38+i*(fh*0.48)+fh*0.28, z);
    fol.castShadow=true; scene.add(fol);
  }
}

// Trees only on sidewalks & park edges, NOT on roads or in buildings
const treePos = [
  // Along vertical sidewalks (x=±6)
  [6,-12],[6,-8],[6,-6],[6,6],[6,8],[6,12],
  [-6,-12],[-6,-8],[-6,-6],[-6,6],[-6,8],[-6,12],
  // Along horizontal sidewalks (z=±6)
  [-12,6],[-8,6],[8,6],[12,6],
  [-12,-6],[-8,-6],[8,-6],[12,-6],
  // Park perimeter
  [-4,4],[-4,-4],[4,4],[4,-4],
  // Avenue sidewalks
  [22,10],[22,-10],[-22,10],[-22,-10],
  [10,22],[-10,22],[10,-22],[-10,-22],
  // Scattered green areas
  [-7,-17],[7,-17],[-7,17],[7,17],
  [-17,-7],[-17,7],[17,-7],[17,7],
  [-26,5],[-26,-5],[26,5],[26,-5],
];
treePos.forEach(([x,z]) => makeTree(x,z,2.8+Math.random()*2.2));

// ── Streetlamps ───────────────────────────────────────────────────
function lamp(x,z) {
  const pole=new THREE.Mesh(
    new THREE.CylinderGeometry(0.065,0.09,5,8),
    new THREE.MeshLambertMaterial({ color:0x3a3a3a })
  );
  pole.position.set(x,2.5,z); pole.castShadow=true; scene.add(pole);
  const arm=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.07,0.07),new THREE.MeshLambertMaterial({color:0x3a3a3a}));
  arm.position.set(x+0.4,5.05,z); scene.add(arm);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.17,8,8),new THREE.MeshBasicMaterial({color:0xffffcc}));
  head.position.set(x+0.78,5.05,z); scene.add(head);
}
[
  [6,-10],[6,0],[6,10],[-6,-10],[-6,0],[-6,10],
  [-10,6],[0,6],[10,6],[-10,-6],[0,-6],[10,-6],
  [22,8],[22,-8],[-22,8],[-22,-8],
  [8,22],[-8,22],[8,-22],[-8,-22],
].forEach(([x,z])=>lamp(x,z));

// ── Clouds ────────────────────────────────────────────────────────
const clouds=[];
function makeCloud(x,y,z,sc=1) {
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0xffffff,transparent:true,opacity:0.92});
  [[0,0,0,2.2*sc],[2.4*sc,0.3*sc,0,1.7*sc],[-1.8*sc,0.2*sc,0,1.8*sc],[0.6*sc,1*sc,0,1.4*sc]].forEach(([cx,cy,cz,r])=>{
    const s=new THREE.Mesh(new THREE.SphereGeometry(r,7,6),mat);
    s.position.set(cx,cy,cz); g.add(s);
  });
  g.position.set(x,y,z); scene.add(g); clouds.push(g);
}
makeCloud(-25,26,-35,1.1); makeCloud(20,28,-25,0.9);
makeCloud(35,24,15,1.0); makeCloud(-35,27,20,1.2);
makeCloud(8,25,-45,0.85); makeCloud(-15,23,40,1.0);
makeCloud(45,30,-5,0.95); makeCloud(-10,29,-55,1.1);

// ── NPCs ─────────────────────────────────────────────────────────
// Placed in streets, not in trees/buildings
const NPCS = [
  {
    name: "Lucas Rajany",
    role: "Guide — À propos de moi",
    emoji: "👤",
    x: 0, z: 9,
    bodyColor: 0x8b5cf6,
    hairColor: 0xffd700,
    auraColor: 0x8b5cf6,
    dialog: "Bienvenue sur mon portfolio interactif ! Je m'appelle Lucas Rajany, étudiant BTS SIO option SLAM au Lycée Pierre Poivre à Saint-Joseph, La Réunion. Passionné de développement applicatif, d'automatisation et d'IA. Je suis actuellement disponible pour un stage !",
    links: [
      { label: "📧 Email", url: "mailto:lucas.lbruno2007@gmail.com" },
      { label: "GitHub", url: "https://github.com/ikar-code/" },
    ]
  },
  {
    name: "Fil du Lord",
    role: "Projet — Média IA automatisé",
    emoji: "📰",
    x: -8, z: 0,
    bodyColor: 0xe05c97,
    hairColor: 0xff9933,
    auraColor: 0xe05c97,
    dialog: "Le Fil du Lord — Média francophone entièrement automatisé par IA. Le pipeline collecte l'actualité via scraping & RSS, vérifie les faits (Gemini), rédige des articles journalistiques (Qwen3-32B via Groq), score la qualité, puis publie automatiquement sur Vercel via GitHub Actions. Stack : Node.js · React · TypeScript · Supabase.",
    links: [
      { label: "🌐 Voir le site", url: "https://lefildulord.vercel.app/" },
      { label: "📄 Détails", url: "https://ikar-code.github.io/portefolio/site/project/projet3.html" },
    ]
  },
  {
    name: "Veille IA",
    role: "Projet — App de veille automatisée",
    emoji: "🔍",
    x: 8, z: 0,
    bodyColor: 0x4ecdc4,

const npcObjs = [];
NPCS.forEach(npc => {
  const g = new THREE.Group();
  g.position.set(npc.x, 0, npc.z);

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.28,0.33,1.38,10),
    new THREE.MeshLambertMaterial({ color:npc.bodyColor })
  );
  body.position.y=0.69; body.castShadow=true; g.add(body);

  // Arms
  [-0.42,0.42].forEach(sx => {
    const arm=new THREE.Mesh(
      new THREE.CylinderGeometry(0.09,0.09,0.75,7),
      new THREE.MeshLambertMaterial({ color:npc.bodyColor })
    );
    arm.position.set(sx,0.88,0); arm.rotation.z=sx>0?0.4:-0.4;
    arm.castShadow=true; g.add(arm);
  });

  const head=new THREE.Mesh(
    new THREE.SphereGeometry(0.30,12,12),
    new THREE.MeshLambertMaterial({ color:0xffe0bd })
  );
  head.position.y=1.62; head.castShadow=true; g.add(head);

  const hair=new THREE.Mesh(
    new THREE.SphereGeometry(0.315,10,8,0,Math.PI*2,0,Math.PI*0.52),
    new THREE.MeshLambertMaterial({ color:npc.hairColor })
  );
  hair.position.y=1.755; g.add(hair);

  // Ground aura ring
  const aura=new THREE.Mesh(
    new THREE.RingGeometry(0.45,0.52,28),
    new THREE.MeshBasicMaterial({ color:npc.auraColor, side:THREE.DoubleSide, transparent:true, opacity:0.35 })
  );
  aura.rotation.x=-Math.PI/2; aura.position.y=0.02; g.add(aura);
  g._aura=aura;

  // Shadow
  const shad=new THREE.Mesh(
    new THREE.CircleGeometry(0.38,16),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.15 })
  );
  shad.rotation.x=-Math.PI/2; shad.position.y=0.015; g.add(shad);

  scene.add(g);
  npcObjs.push({ g, data:npc });
});

// ── Player / Controls ─────────────────────────────────────────────
const player = { x:0, z:12, yaw:Math.PI, pitch:0 };
const keys = {};
let locked=false, dialogOpen=false, nearNPC=null;

document.addEventListener('keydown', e => {
  keys[e.code]=true;
  if (e.code==='KeyE') {
    if (!dialogOpen && nearNPC) openDlg(nearNPC);
    else if (dialogOpen) closeDlg();
  }
  if (e.code==='Escape' && dialogOpen) closeDlg();
});
document.addEventListener('keyup', e => { keys[e.code]=false; });

document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === document.body;
  document.getElementById('crosshair').style.display = locked ? 'block' : 'none';
  document.getElementById('hud').style.display = locked ? 'block' : 'none';
  if (!locked && !dialogOpen) {
    document.getElementById('overlay').style.display = 'flex';
  }
});

document.addEventListener('mousemove', e => {
  if (!locked || dialogOpen) return;
  player.yaw  -= e.movementX * 0.0022;
  player.pitch = Math.max(-1.15, Math.min(1.15, player.pitch - e.movementY * 0.0022));
});

function startGame() {
  document.getElementById('overlay').style.display='none';
  document.body.requestPointerLock();
}
document.getElementById('start-btn').addEventListener('click', startGame);
canvas.addEventListener('click', () => { if (!locked && !dialogOpen) startGame(); });

function openDlg(npc) {
  dialogOpen=true;
  document.exitPointerLock();
  document.getElementById('dlg-avatar').textContent = npc.data.emoji;
  document.getElementById('dlg-avatar').style.background = '#'+npc.data.auraColor.toString(16).padStart(6,'0')+'22';
  document.getElementById('dlg-name').textContent = npc.data.name;
  document.getElementById('dlg-role').textContent = npc.data.role;
  document.getElementById('dlg-text').textContent = npc.data.dialog;
  const linksEl = document.getElementById('dlg-links');
  linksEl.innerHTML='';
  (npc.data.links||[]).forEach(l=>{
    const a=document.createElement('a');
    a.href=l.url; a.textContent=l.label; a.target='_blank';
    linksEl.appendChild(a);
  });
  document.getElementById('dlg').style.display='block';
  document.getElementById('hint').style.display='none';
  document.getElementById('npc-label').style.display='none';
}
function closeDlg() {
  dialogOpen=false;
  document.getElementById('dlg').style.display='none';
  document.getElementById('overlay').style.display='none';
  document.body.requestPointerLock();
}
document.getElementById('dlg-close').addEventListener('click', closeDlg);

// ── Collision ─────────────────────────────────────────────────────
const colliders = [
  {x:-11,z:-11,w:10,d:10},{x:11,z:-11,w:10,d:10},
  {x:-11,z:11,w:10,d:10},{x:11,z:11,w:10,d:10},
  {x:-25,z:-10,w:10,d:12},{x:25,z:-10,w:10,d:12},
  {x:-25,z:10,w:10,d:12},{x:25,z:10,w:10,d:12},
  {x:-10,z:-25,w:12,d:10},{x:10,z:-25,w:10,d:10},
  {x:-10,z:25,w:10,d:10},{x:10,z:25,w:10,d:10},
];

function blocked(nx,nz) {
  const r=0.55;
  for (const c of colliders) {
    if (nx>c.x-c.w/2-r && nx<c.x+c.w/2+r && nz>c.z-c.d/2-r && nz<c.z+c.d/2+r) return true;
  }
  return false;
}

// ── Animation ─────────────────────────────────────────────────────
let t=0;
function animate() {
  requestAnimationFrame(animate);
  t+=0.015;

  if (!dialogOpen && locked) {
    const sp=0.1;
    const s=Math.sin(player.yaw), co=Math.cos(player.yaw);
    let nx=player.x, nz=player.z;
    if (keys['KeyW']||keys['KeyZ']) { nx-=s*sp; nz-=co*sp; }
    if (keys['KeyS'])               { nx+=s*sp; nz+=co*sp; }
    if (keys['KeyA']||keys['KeyQ']) { nx-=co*sp; nz+=s*sp; }
    if (keys['KeyD'])               { nx+=co*sp; nz-=s*sp; }
    nx=Math.max(-28,Math.min(28,nx));
    nz=Math.max(-28,Math.min(28,nz));
    if (!blocked(nx,nz)) { player.x=nx; player.z=nz; }
  }

  camera.position.set(player.x,1.7,player.z);
  camera.rotation.order='YXZ';
  camera.rotation.y=player.yaw;
  camera.rotation.x=player.pitch;

  // Clouds
  clouds.forEach((c,i) => {
    c.position.x+=0.005+i*0.0008;
    if (c.position.x>55) c.position.x=-55;
  });

  // Blink
  blinkLights.forEach((b,i) => {
    b.material.color.setHex(Math.sin(t*2+i*2.1)>0.65?0xff2222:0x330000);
  });

  // NPC update
  nearNPC=null;
  let minD=2.8;
  npcObjs.forEach((n,i) => {
    n.g.position.y=Math.sin(t*1.2+i*1.1)*0.05;
    n.g.lookAt(player.x, 1.6+n.g.position.y, player.z);
    const dx=player.x-n.data.x, dz=player.z-n.data.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    const close=dist<3;
    n.g._aura.material.opacity = close ? 0.75 : 0.25;
    n.g._aura.rotation.z = t*0.8+i;
    if (dist<minD) { minD=dist; nearNPC=n; }
  });

  const hintEl=document.getElementById('hint');
  const labelEl=document.getElementById('npc-label');
  if (!dialogOpen && locked && nearNPC) {
    hintEl.style.display='block';
    hintEl.textContent=`Parler à ${nearNPC.data.name} [E]`;
    labelEl.style.display='block';
    labelEl.textContent=nearNPC.data.name;
  } else if (!dialogOpen) {
    hintEl.style.display='none';
    labelEl.style.display='none';
  }

  renderer.render(scene,camera);
}
animate();
</script>
