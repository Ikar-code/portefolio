<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lucas Rajany — Portfolio 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Segoe UI',sans-serif; }
#c { display:block; width:100vw; height:100vh; }
#crosshair {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:18px; height:18px; pointer-events:none; display:none;
}
#crosshair::before,#crosshair::after {
  content:''; position:absolute; background:rgba(255,255,255,0.85);
}
#crosshair::before { top:50%; left:0; width:100%; height:1.5px; transform:translateY(-50%); }
#crosshair::after  { left:50%; top:0; height:100%; width:1.5px; transform:translateX(-50%); }
#overlay {
  position:fixed; inset:0;
  background:linear-gradient(135deg,rgba(0,0,0,0.82),rgba(10,5,30,0.9));
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#fff; gap:12px; z-index:100;
}
#overlay .name { font-size:38px; font-weight:200; letter-spacing:0.15em; }
#overlay .name span { color:#8b5cf6; font-weight:600; }
#overlay .sub { font-size:13px; color:rgba(255,255,255,0.45); letter-spacing:0.08em; text-transform:uppercase; }
#overlay .badge {
  margin-top:4px; font-size:12px;
  background:rgba(74,197,94,0.15); border:1px solid rgba(74,197,94,0.4);
  color:#4ac55e; padding:4px 14px; border-radius:20px; letter-spacing:0.05em;
}
#overlay button {
  margin-top:16px; padding:12px 32px;
  background:rgba(139,92,246,0.2); border:1px solid rgba(139,92,246,0.5);
  border-radius:10px; color:#c4b5fd; font-size:14px; letter-spacing:0.05em; cursor:pointer;
  transition:all 0.2s;
}
#overlay button:hover { background:rgba(139,92,246,0.35); color:#fff; }
#overlay .controls { margin-top:8px; font-size:11px; color:rgba(255,255,255,0.3); line-height:2; text-align:center; }
#hud {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  font-size:11px; color:rgba(255,255,255,0.35); pointer-events:none; display:none;
  background:rgba(0,0,0,0.35); padding:5px 16px; border-radius:20px;
  letter-spacing:0.06em; white-space:nowrap;
}
#hint {
  position:fixed; bottom:52px; left:50%; transform:translateX(-50%);
  background:rgba(10,5,25,0.88); border:1px solid rgba(139,92,246,0.4);
  border-radius:24px; padding:7px 22px; color:#c4b5fd; font-size:13px;
  pointer-events:none; display:none; white-space:nowrap; letter-spacing:0.03em;
}
#npc-label {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-110px);
  background:rgba(10,5,25,0.78); border:1px solid rgba(139,92,246,0.3);
  border-radius:8px; padding:4px 14px; color:#e9d5ff; font-size:12px; font-weight:500;
  pointer-events:none; display:none; white-space:nowrap; letter-spacing:0.04em;
}
#dlg {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  width:540px; max-width:93vw;
  background:rgba(8,5,20,0.97); border:1px solid rgba(139,92,246,0.35);
  border-radius:16px; padding:22px 26px; color:#e2e0f0; display:none; z-index:50;
  box-shadow:0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(139,92,246,0.08);
}
#dlg-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
#dlg-avatar {
  width:40px; height:40px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0;
}
#dlg-name { font-size:11px; font-weight:600; color:#a78bfa; letter-spacing:0.1em; text-transform:uppercase; }
#dlg-role { font-size:11px; color:rgba(255,255,255,0.35); margin-top:2px; }
#dlg-text { font-size:13.5px; line-height:1.75; color:#ccc9e0; }
#dlg-links { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
#dlg-links a {
  font-size:12px; padding:5px 14px;
  background:rgba(139,92,246,0.12); border:1px solid rgba(139,92,246,0.3);
  border-radius:7px; color:#a78bfa; text-decoration:none; transition:all 0.18s;
}
#dlg-links a:hover { background:rgba(139,92,246,0.25); color:#e9d5ff; }
#dlg-close {
  margin-top:14px; float:right; font-size:12px; padding:5px 18px;
  background:transparent; border:1px solid rgba(255,255,255,0.12);
  border-radius:7px; color:rgba(255,255,255,0.4); cursor:pointer; transition:all 0.18s;
}
#dlg-close:hover { border-color:rgba(255,255,255,0.25); color:rgba(255,255,255,0.7); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="crosshair"></div>
<div id="hud">ZQSD · avancer/reculer/strafer &nbsp;|&nbsp; Souris · regarder &nbsp;|&nbsp; E · parler &nbsp;|&nbsp; Échap · menu</div>
<div id="hint"></div>
<div id="npc-label"></div>
<div id="dlg">
  <div id="dlg-header">
    <div id="dlg-avatar"></div>
    <div><div id="dlg-name"></div><div id="dlg-role"></div></div>
  </div>
  <div id="dlg-text"></div>
  <div id="dlg-links"></div>
  <button id="dlg-close">Fermer [E]</button>
</div>
<div id="overlay">
  <div class="name">Lucas<span>.</span>Rajany</div>
  <div class="sub">Étudiant BTS SIO SLAM · Portfolio 3D</div>
  <div class="badge">● Disponible pour un stage · Réunion</div>
  <button id="start-btn">Entrer dans la ville</button>
  <div class="controls">ZQSD · se déplacer &nbsp;|&nbsp; Souris · regarder<br>E · parler aux habitants &nbsp;|&nbsp; Échap · menu</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderer ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Scene ─────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
// Fog starts far — lets you see distant buildings before they fade
scene.fog = new THREE.Fog(0xc0dff0, 120, 350);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 400);
camera.position.set(0, 1.7, 18);

// ── Lights ────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff8e8, 0.72));
const sun = new THREE.DirectionalLight(0xfffbe8, 2.0);
sun.position.set(60, 90, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1; sun.shadow.camera.far=200;
sun.shadow.camera.left=sun.shadow.camera.bottom=-80;
sun.shadow.camera.right=sun.shadow.camera.top=80;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x55aa44, 0.52));

// ── Ground ────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(600,600),
  new THREE.MeshLambertMaterial({ color:0x5aaa55 })
);
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

// ── Road helper ───────────────────────────────────────────────────
const roadMat  = new THREE.MeshLambertMaterial({ color:0x888877 });
const swalkMat = new THREE.MeshLambertMaterial({ color:0xccbbaa });
const dashMat  = new THREE.MeshBasicMaterial({ color:0xffffff });
const grassMat = new THREE.MeshLambertMaterial({ color:0x66bb55 });

function plane(x,z,w,d,mat,y=0.01){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),mat);
  m.rotation.x=-Math.PI/2; m.position.set(x,y,z);
  m.receiveShadow=true; scene.add(m);
}
function dash(x,z,w,d){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),dashMat);
  m.rotation.x=-Math.PI/2; m.position.set(x,0.02,z); scene.add(m);
}

// Main roads — wide grid every 30 units across 300 units
const ROAD_W=8, SWALK=2.2;
const roads_x=[-60,-30,0,30,60];
const roads_z=[-60,-30,0,30,60];
roads_x.forEach(rx=> plane(rx,0,ROAD_W,600,roadMat));
roads_z.forEach(rz=> plane(0,rz,600,ROAD_W,roadMat));
// Sidewalks
roads_x.forEach(rx=>{ plane(rx-ROAD_W/2-SWALK/2,0,SWALK,600,swalkMat,0.02); plane(rx+ROAD_W/2+SWALK/2,0,SWALK,600,swalkMat,0.02); });
roads_z.forEach(rz=>{ plane(0,rz-ROAD_W/2-SWALK/2,600,SWALK,swalkMat,0.02); plane(0,rz+ROAD_W/2+SWALK/2,600,SWALK,swalkMat,0.02); });
// Center dashes
roads_x.forEach(rx=>{ for(let i=-80;i<80;i+=6){ dash(rx,i,0.22,3); } });
roads_z.forEach(rz=>{ for(let i=-80;i<80;i+=6){ dash(i,rz,3,0.22); } });

// ── Parks (green plazas at intersections) ─────────────────────────
const parkIntersections=[[0,0],[30,30],[-30,30],[30,-30],[-30,-30]];
parkIntersections.forEach(([px,pz])=>{
  plane(px,pz,14,14,grassMat,0.03);
  // tiny fountain
  const fb=new THREE.Mesh(new THREE.CylinderGeometry(1.1,1.3,0.4,20),new THREE.MeshLambertMaterial({color:0xd0c8b5}));
  fb.position.set(px,0.2,pz); fb.castShadow=true; scene.add(fb);
  const fw=new THREE.Mesh(new THREE.CylinderGeometry(0.9,0.9,0.1,20),new THREE.MeshLambertMaterial({color:0x55aadd,transparent:true,opacity:0.8}));
  fw.position.set(px,0.42,pz); scene.add(fw);
  const fp=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.12,1.1,8),new THREE.MeshLambertMaterial({color:0xc0b0a0}));
  fp.position.set(px,0.95,pz); scene.add(fp);
});

// ── Buildings ─────────────────────────────────────────────────────
const wallPalette=[0xf2e8d8,0xe8d8c5,0xd5c8b5,0xeee0cc,0xf8f0e0,0xe2d5c0,0xd8e0e8,0xe8e8f0,0xf0e8e0];
const roofPalette=[0xcc8855,0xbb7744,0xaa6633,0xdd9966,0xc47a3a,0x886644,0x996655];
const winPalette =[0x6aaddd,0x4499cc,0x88bbdd,0x3388bb,0x77aacc,0x55bbee];

function rnd(a){ return a[Math.floor(Math.random()*a.length)]; }
function ri(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }

function makeBuilding(x,z,w,h,d){
  const wc=rnd(wallPalette), rc=rnd(roofPalette), wnc=rnd(winPalette);
  const body=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:wc}));
  body.position.set(x,h/2,z); body.castShadow=true; body.receiveShadow=true; scene.add(body);
  const roof=new THREE.Mesh(new THREE.BoxGeometry(w+0.3,0.35,d+0.3),new THREE.MeshLambertMaterial({color:rc}));
  roof.position.set(x,h+0.18,z); roof.castShadow=true; scene.add(roof);
  // Windows
  const rows=Math.max(1,Math.floor(h/2.3)), cols=Math.max(1,Math.floor(w/1.7));
  const winMat=new THREE.MeshBasicMaterial({color:wnc,transparent:true,opacity:0.85});
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(Math.random()<0.62){
    const wx=x-w/2+0.9+c*(w/cols), wy=1.1+r*2.2;
    const win=new THREE.Mesh(new THREE.PlaneGeometry(0.58,0.68),winMat);
    win.position.set(wx,wy,z+d/2+0.01); scene.add(win);
    const w2=win.clone(); w2.position.z=z-d/2-0.01; w2.rotation.y=Math.PI; scene.add(w2);
  }
  const door=new THREE.Mesh(new THREE.PlaneGeometry(0.9,1.5),new THREE.MeshBasicMaterial({color:0x7a4a25}));
  door.position.set(x,0.75,z+d/2+0.02); scene.add(door);
}

function makeSkyscraper(x,z,h){
  makeBuilding(x,z,7,h,7);
  const ant=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,6,6),new THREE.MeshBasicMaterial({color:0x888}));
  ant.position.set(x,h+3,z); scene.add(ant);
  const bl=new THREE.Mesh(new THREE.SphereGeometry(0.15,6,6),new THREE.MeshBasicMaterial({color:0xff2222}));
  bl.position.set(x,h+6.1,z); scene.add(bl); blinkLights.push(bl);
  const tl=new THREE.PointLight(0x4466ff,1.2,12); tl.position.set(x,h,z); scene.add(tl);
}
const blinkLights=[];

// City grid: blocks between roads
// Each block occupies one of the cells between road lines
// Cells: x from -75 to 75, z from -75 to 75, skip cells near roads (±ROAD_W/2 ± some margin)
// We define block centers and fill with buildings

function fillBlock(cx, cz, bw, bd){
  // Fill a city block at center cx,cz of size bw x bd with several buildings
  const margin=1.5;
  const usableW=bw-margin*2, usableD=bd-margin*2;
  // subdivide into a small grid
  const cols=Math.max(1,Math.floor(usableW/9));
  const rows=Math.max(1,Math.floor(usableD/9));
  const cellW=usableW/cols, cellD=usableD/rows;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const bx=cx-usableW/2+cellW*(c+0.5);
    const bz=cz-usableD/2+cellD*(r+0.5);
    const pw=cellW*0.7, pd=cellD*0.7;
    const ph=ri(4,16);
    makeBuilding(bx,bz,pw,ph,pd);
  }
}

// Grid of blocks: road centers at -60,-30,0,30,60
// Block centers halfway between roads: -75,-45,-15,15,45,75
const blockCenters=[-75,-45,-15,15,45,75];
const BLOCK_SIZE=22; // usable block size (between roads of width 8 + sidewalks)

blockCenters.forEach(bx=>{
  blockCenters.forEach(bz=>{
    // Skip the center park area
    if(Math.abs(bx)<20 && Math.abs(bz)<20) return;
    fillBlock(bx,bz,BLOCK_SIZE,BLOCK_SIZE);
  });
});

// Skyscrapers at major intersections (not center)
[[-60,-60],[60,-60],[-60,60],[60,60],
 [-60,0],[60,0],[0,-60],[0,60],
 [-30,-30],[30,-30],[-30,30],[30,30]
].forEach(([sx,sz])=> makeSkyscraper(sx,sz,ri(28,45)));

// ── Distant buildings (beyond playable area, just visuals) ─────────
// These extend city silhouette to horizon
for(let ring=1;ring<=4;ring++){
  const dist=100+ring*55;
  const count=ring*16;
  for(let i=0;i<count;i++){
    const angle=(i/count)*Math.PI*2;
    const r=dist+Math.random()*40;
    const bx=Math.cos(angle)*r, bz=Math.sin(angle)*r;
    const w=ri(6,20), h=ri(8,50), d=ri(6,18);
    makeBuilding(bx,bz,w,h,d);
    // occasional skyscraper on horizon
    if(Math.random()<0.25) makeSkyscraper(bx+ri(-5,5),bz+ri(-5,5),ri(40,80));
  }
}

// ── Trees ─────────────────────────────────────────────────────────
function makeTree(x,z,h=3.2){
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.18,h*0.38,7),new THREE.MeshLambertMaterial({color:0x7a4f2e}));
  trunk.position.set(x,h*0.19,z); trunk.castShadow=true; scene.add(trunk);
  const cols=[0x2d7a2d,0x3a9a3a,0x4aaa40];
  for(let i=0;i<3;i++){
    const r=(3-i)*0.52+0.28, fh=r*1.5;
    const fol=new THREE.Mesh(new THREE.ConeGeometry(r,fh,9),new THREE.MeshLambertMaterial({color:cols[i]}));
    fol.position.set(x,h*0.38+i*(fh*0.48)+fh*0.28,z); fol.castShadow=true; scene.add(fol);
  }
}

// Trees along all sidewalks, repeated across expanded grid
roads_x.forEach(rx=>{
  for(let z=-80;z<=80;z+=7){
    makeTree(rx-ROAD_W/2-SWALK-1,z,2.5+Math.random()*2);
    makeTree(rx+ROAD_W/2+SWALK+1,z,2.5+Math.random()*2);
  }
});
roads_z.forEach(rz=>{
  for(let x=-80;x<=80;x+=7){
    if(Math.abs(x)>5){ // avoid road intersections
      makeTree(x,rz-ROAD_W/2-SWALK-1,2.5+Math.random()*2);
      makeTree(x,rz+ROAD_W/2+SWALK+1,2.5+Math.random()*2);
    }
  }
});
// Park trees
parkIntersections.forEach(([px,pz])=>{
  [[-5,-5],[-5,5],[5,-5],[5,5],[-3,0],[3,0],[0,-3],[0,3]].forEach(([dx,dz])=>{
    if(Math.abs(dx)>1||Math.abs(dz)>1) makeTree(px+dx,pz+dz,2+Math.random()*1.5);
  });
});

// ── Streetlamps ───────────────────────────────────────────────────
function lamp(x,z){
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,5,8),new THREE.MeshLambertMaterial({color:0x3a3a3a}));
  pole.position.set(x,2.5,z); pole.castShadow=true; scene.add(pole);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.16,8,8),new THREE.MeshBasicMaterial({color:0xffffcc}));
  head.position.set(x,5.1,z); scene.add(head);
}
roads_x.forEach(rx=>{
  for(let z=-70;z<=70;z+=12){
    lamp(rx-ROAD_W/2-1,z); lamp(rx+ROAD_W/2+1,z);
  }
});
roads_z.forEach(rz=>{
  for(let x=-70;x<=70;x+=12){
    lamp(x,rz-ROAD_W/2-1); lamp(x,rz+ROAD_W/2+1);
  }
});

// ── Clouds ────────────────────────────────────────────────────────
const clouds=[];
function makeCloud(x,y,z,sc=1){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0xffffff,transparent:true,opacity:0.9});
  [[0,0,0,2.2*sc],[2.5*sc,0.3*sc,0,1.7*sc],[-2*sc,0.25*sc,0,1.8*sc],[0.7*sc,1*sc,0,1.4*sc],[-0.8*sc,-0.1*sc,1*sc,1.2*sc]].forEach(([cx,cy,cz,r])=>{
    const s=new THREE.Mesh(new THREE.SphereGeometry(r,7,6),mat);
    s.position.set(cx,cy,cz); g.add(s);
  });
  g.position.set(x,y,z); scene.add(g); clouds.push(g);
}
for(let i=0;i<18;i++){
  makeCloud((Math.random()-0.5)*400, 28+Math.random()*20, (Math.random()-0.5)*400, 0.8+Math.random()*1.4);
}

// ── NPCs ──────────────────────────────────────────────────────────
// Spread across the expanded grid, all in streets or park areas
const NPCS=[
  // --- CENTRE (parc principal) ---
  {
    name:"Lucas Rajany",role:"Guide — Bienvenue !",emoji:"👤",
    x:0,z:12,
    bodyColor:0x8b5cf6,hairColor:0xffd700,auraColor:0x8b5cf6,
    dialog:"Bienvenue dans mon portfolio 3D ! Je m'appelle Lucas Rajany, étudiant BTS SIO SLAM au Lycée Pierre Poivre à Saint-Joseph, La Réunion. Explore la ville — chaque habitant te parle d'un aspect de mon parcours. Disponible pour un stage dès maintenant !",
    links:[{label:"📧 Email",url:"mailto:lucas.lbruno2007@gmail.com"},{label:"GitHub",url:"https://github.com/ikar-code/"}]
  },
  {
    name:"Maëlis",role:"À propos — Profil & identité",emoji:"🧑",
    x:-10,z:0,
    bodyColor:0xe05c97,hairColor:0xffeebb,auraColor:0xe05c97,
    dialog:"Lucas est né à La Réunion, basé à Saint-Joseph. Sérieux, curieux et organisé, il est passionné par la résolution de problèmes complexes. Langues : Français natif, Anglais B1, Espagnol A2. Certifications : PIX, ASSR 1 & 2, Permis B.",
    links:[]
  },
  {
    name:"Théo",role:"Formation — BTS SIO SLAM",emoji:"🎓",
    x:10,z:0,
    bodyColor:0x4ecdc4,hairColor:0x88ddff,auraColor:0x4ecdc4,
    dialog:"Lucas suit un BTS SIO option SLAM (Solutions Logicielles et Applications Métiers) au Lycée Pierre Poivre depuis 2025, jusqu'en 2027. Il y développe ses compétences en algorithmique, architecture logicielle, développement web et conception d'applications.",
    links:[]
  },
  {
    name:"Nox",role:"Soft skills",emoji:"⭐",
    x:0,z:-12,
    bodyColor:0xf59e0b,hairColor:0xfde68a,auraColor:0xf59e0b,
    dialog:"Lucas se distingue par son esprit d'analyse, son sens de l'organisation et son adaptabilité. Il aime le travail en équipe et s'investit dans chaque projet avec curiosité. Il est capable de monter en compétences rapidement sur de nouveaux outils.",
    links:[]
  },

  // --- QUARTIER NORD (z=-30) ---
  {
    name:"Fil du Lord I",role:"Projet — Présentation",emoji:"📰",
    x:-15,z:-30,
    bodyColor:0xa855f7,hairColor:0xf0abfc,auraColor:0xa855f7,
    dialog:"Le Fil du Lord est un média d'actualité francophone entièrement automatisé par IA. Il produit des articles journalistiques sans intervention humaine, de la recherche d'info jusqu'à la publication en ligne sur Vercel. Site : lefildulord.vercel.app",
    links:[{label:"🌐 Voir le site",url:"https://lefildulord.vercel.app/"},{label:"📄 Projet",url:"https://ikar-code.github.io/portefolio/site/project/projet3.html"}]
  },
  {
    name:"Fil du Lord II",role:"Projet — Pipeline IA",emoji:"⚙️",
    x:0,z:-30,

const npcObjs=[];
NPCS.forEach(npc=>{
  const g=new THREE.Group(); g.position.set(npc.x,0,npc.z);
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.33,1.38,10),new THREE.MeshLambertMaterial({color:npc.bodyColor}));
  body.position.y=0.69; body.castShadow=true; g.add(body);
  [-0.42,0.42].forEach(sx=>{
    const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.09,0.72,7),new THREE.MeshLambertMaterial({color:npc.bodyColor}));
    arm.position.set(sx,0.88,0); arm.rotation.z=sx>0?0.4:-0.4; g.add(arm);
  });
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.30,12,12),new THREE.MeshLambertMaterial({color:0xffe0bd}));
  head.position.y=1.62; head.castShadow=true; g.add(head);
  const hair=new THREE.Mesh(new THREE.SphereGeometry(0.315,10,8,0,Math.PI*2,0,Math.PI*0.52),new THREE.MeshLambertMaterial({color:npc.hairColor}));
  hair.position.y=1.755; g.add(hair);
  const aura=new THREE.Mesh(new THREE.RingGeometry(0.45,0.52,28),new THREE.MeshBasicMaterial({color:npc.auraColor,side:THREE.DoubleSide,transparent:true,opacity:0.35}));
  aura.rotation.x=-Math.PI/2; aura.position.y=0.02; g.add(aura); g._aura=aura;
  const shad=new THREE.Mesh(new THREE.CircleGeometry(0.38,16),new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.15}));
  shad.rotation.x=-Math.PI/2; shad.position.y=0.015; g.add(shad);
  scene.add(g); npcObjs.push({g,data:npc});
});

// ── Player ────────────────────────────────────────────────────────
const player={x:0,z:18,yaw:Math.PI,pitch:0};
const keys={};
let locked=false,dialogOpen=false,nearNPC=null;

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='KeyE'){ if(!dialogOpen&&nearNPC) openDlg(nearNPC); else if(dialogOpen) closeDlg(); }
  if(e.code==='Escape'&&dialogOpen) closeDlg();
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });

document.addEventListener('pointerlockchange',()=>{
  locked=document.pointerLockElement===document.body;
  document.getElementById('crosshair').style.display=locked?'block':'none';
  document.getElementById('hud').style.display=locked?'block':'none';
  if(!locked&&!dialogOpen) document.getElementById('overlay').style.display='flex';
});
document.addEventListener('mousemove',e=>{
  if(!locked||dialogOpen) return;
  player.yaw-=e.movementX*0.0022;
  player.pitch=Math.max(-1.15,Math.min(1.15,player.pitch-e.movementY*0.0022));
});
function startGame(){ document.getElementById('overlay').style.display='none'; document.body.requestPointerLock(); }
document.getElementById('start-btn').addEventListener('click',startGame);
canvas.addEventListener('click',()=>{ if(!locked&&!dialogOpen) startGame(); });

function openDlg(npc){
  dialogOpen=true; document.exitPointerLock();
  document.getElementById('dlg-avatar').textContent=npc.data.emoji;
  document.getElementById('dlg-avatar').style.background='#'+npc.data.auraColor.toString(16).padStart(6,'0')+'22';
  document.getElementById('dlg-name').textContent=npc.data.name;
  document.getElementById('dlg-role').textContent=npc.data.role;
  document.getElementById('dlg-text').textContent=npc.data.dialog;
  const le=document.getElementById('dlg-links'); le.innerHTML='';
  (npc.data.links||[]).forEach(l=>{ const a=document.createElement('a'); a.href=l.url; a.textContent=l.label; a.target='_blank'; le.appendChild(a); });
  document.getElementById('dlg').style.display='block';
  document.getElementById('hint').style.display='none';
  document.getElementById('npc-label').style.display='none';
}
function closeDlg(){
  dialogOpen=false;
  document.getElementById('dlg').style.display='none';
  document.getElementById('overlay').style.display='none';
  document.body.requestPointerLock();
}
document.getElementById('dlg-close').addEventListener('click',closeDlg);

// ── Collision — playable zone is ±85 units, block buildings ──────
// Simple AABB — block centers of buildings, approximated
const colliders=[];
// Auto-generate colliders for each block cell
blockCenters.forEach(bx=>{ blockCenters.forEach(bz=>{
  if(Math.abs(bx)<20&&Math.abs(bz)<20) return;
  colliders.push({x:bx,z:bz,hw:10,hd:10});
}); });

function blocked(nx,nz){
  const r=0.55;
  for(const c of colliders){
    if(nx>c.x-c.hw-r&&nx<c.x+c.hw+r&&nz>c.z-c.hd-r&&nz<c.z+c.hd+r) return true;
  }
  if(Math.abs(nx)>85||Math.abs(nz)>85) return true;
  return false;
}

// ── Loop ──────────────────────────────────────────────────────────
let t=0;
function animate(){
  requestAnimationFrame(animate); t+=0.015;
  if(!dialogOpen&&locked){
    const sp=0.12;
    const s=Math.sin(player.yaw),co=Math.cos(player.yaw);
    let nx=player.x,nz=player.z;
    if(keys['KeyW']||keys['KeyZ']){nx-=s*sp;nz-=co*sp;}
    if(keys['KeyS']){nx+=s*sp;nz+=co*sp;}
    if(keys['KeyA']||keys['KeyQ']){nx-=co*sp;nz+=s*sp;}
    if(keys['KeyD']){nx+=co*sp;nz-=s*sp;}
    if(!blocked(nx,nz)){player.x=nx;player.z=nz;}
    else{ if(!blocked(nx,player.z)){player.x=nx;} else if(!blocked(player.x,nz)){player.z=nz;} }
  }
  camera.position.set(player.x,1.7,player.z);
  camera.rotation.order='YXZ';
  camera.rotation.y=player.yaw;
  camera.rotation.x=player.pitch;

  clouds.forEach((c,i)=>{ c.position.x+=0.006+i*0.0005; if(c.position.x>200) c.position.x=-200; });
  blinkLights.forEach((b,i)=>{ b.material.color.setHex(Math.sin(t*2+i*2.1)>0.65?0xff2222:0x330000); });

  nearNPC=null; let minD=3.2;
  npcObjs.forEach((n,i)=>{
    n.g.position.y=Math.sin(t*1.2+i*1.1)*0.05;
    n.g.lookAt(player.x,1.6+n.g.position.y,player.z);
    const dx=player.x-n.data.x,dz=player.z-n.data.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    n.g._aura.material.opacity=dist<3.5?0.8:0.28;
    n.g._aura.rotation.z=t*0.8+i;
    if(dist<minD){minD=dist;nearNPC=n;}
  });
  const hintEl=document.getElementById('hint'),labelEl=document.getElementById('npc-label');
  if(!dialogOpen&&locked&&nearNPC){
    hintEl.style.display='block'; hintEl.textContent=`Parler à ${nearNPC.data.name} [E]`;
    labelEl.style.display='block'; labelEl.textContent=nearNPC.data.name;
  } else if(!dialogOpen){ hintEl.style.display='none'; labelEl.style.display='none'; }

  renderer.render(scene,camera);
}
animate();
