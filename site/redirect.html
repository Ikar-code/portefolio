<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
#c { display: block; width: 100vw; height: 100vh; }

#crosshair {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 18px; height: 18px;
  pointer-events: none; display: none;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(255,255,255,0.8);
}
#crosshair::before { top: 50%; left: 0; width: 100%; height: 1.5px; transform: translateY(-50%); }
#crosshair::after  { left: 50%; top: 0; height: 100%; width: 1.5px; transform: translateX(-50%); }

#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #fff; gap: 16px;
}
#overlay h1 { font-size: 28px; font-weight: 300; letter-spacing: 0.1em; }
#overlay p  { font-size: 14px; color: rgba(255,255,255,0.6); }
#overlay button {
  margin-top: 8px; padding: 10px 28px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px; color: #fff;
  font-size: 14px; cursor: pointer;
  transition: background 0.2s;
}
#overlay button:hover { background: rgba(255,255,255,0.2); }

#hud {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,0.45);
  pointer-events: none; display: none;
  background: rgba(0,0,0,0.3);
  padding: 6px 14px; border-radius: 20px;
  letter-spacing: 0.05em;
}

#hint {
  position: fixed; bottom: 60px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 24px; padding: 7px 20px;
  color: #fff; font-size: 13px;
  pointer-events: none; display: none;
  white-space: nowrap;
}

#dlg {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  width: 500px; max-width: 90vw;
  background: rgba(255,255,255,0.95);
  border-radius: 14px; padding: 20px 24px;
  color: #111; display: none;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}
#dlg-name {
  font-size: 11px; font-weight: 600;
  color: #4a7c59; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 8px;
}
#dlg-text { font-size: 14px; line-height: 1.7; color: #222; }
#dlg button {
  margin-top: 14px; padding: 6px 18px;
  background: #4a7c59; border: none;
  border-radius: 7px; color: #fff;
  font-size: 13px; cursor: pointer;
  float: right;
}
#dlg button:hover { background: #3a6347; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="crosshair"></div>
<div id="hud">ZQSD · se déplacer &nbsp;|&nbsp; Souris · regarder &nbsp;|&nbsp; E · parler &nbsp;|&nbsp; Échap · menu</div>
<div id="hint"></div>
<div id="dlg">
  <div id="dlg-name"></div>
  <div id="dlg-text"></div>
  <button id="dlg-close">Fermer [E]</button>
</div>

<div id="overlay">
  <h1>Portfolio 3D</h1>
  <p>Clique pour commencer à explorer</p>
  <button id="start-btn">Entrer dans la ville</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Renderer ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Scene ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0xd0e8f0, 30, 90);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 14);

// ─── Lights ─────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xfff4e0, 0.7);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfffbe0, 2.2);
sun.position.set(30, 50, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 150;
sun.shadow.camera.left = sun.shadow.camera.bottom = -50;
sun.shadow.camera.right = sun.shadow.camera.top = 50;
scene.add(sun);

const hemi = new THREE.HemisphereLight(0x87ceeb, 0x4a7c59, 0.6);
scene.add(hemi);

// ─── Ground ─────────────────────────────────────────────────────────────────
const grassMat = new THREE.MeshLambertMaterial({ color: 0x5aaa5a });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), grassMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Roads
function addRoad(x, z, w, d) {
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(w, d),
    new THREE.MeshLambertMaterial({ color: 0x888877 })
  );
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(x, 0.01, z);
  mesh.receiveShadow = true;
  scene.add(mesh);
}
addRoad(0, 0, 6, 200);   // main vertical road
addRoad(0, 0, 200, 6);   // main horizontal road
addRoad(-18, 0, 5, 200);
addRoad(18, 0, 5, 200);
addRoad(0, -18, 200, 5);
addRoad(0, 18, 200, 5);

// Sidewalks
function addSidewalk(x, z, w, d) {
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(w, d),
    new THREE.MeshLambertMaterial({ color: 0xccbbaa })
  );
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(x, 0.02, z);
  scene.add(mesh);
}
addSidewalk(4.5, 0, 2, 200);
addSidewalk(-4.5, 0, 2, 200);
addSidewalk(0, 4.5, 200, 2);
addSidewalk(0, -4.5, 200, 2);

// Road dashes
const dashMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
for (let i = -20; i < 20; i += 4) {
  const d = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 2), dashMat);
  d.rotation.x = -Math.PI / 2;
  d.position.set(0, 0.015, i);
  scene.add(d);
  const d2 = new THREE.Mesh(new THREE.PlaneGeometry(2, 0.2), dashMat);
  d2.rotation.x = -Math.PI / 2;
  d2.position.set(i, 0.015, 0);
  scene.add(d2);
}

// ─── Buildings ──────────────────────────────────────────────────────────────
const buildingColors = [0xf0e6d3, 0xe8d5c0, 0xd4c4b0, 0xe8e0d0, 0xf5ead8, 0xddd0c0];
const roofColors = [0xcc8855, 0xbb7744, 0xaa6633, 0xdd9966, 0xc47a45];
const accentColors = [0x4488cc, 0x3399bb, 0x55aadd, 0x6699cc];

function makeBuilding(x, z, w, h, d, opt = {}) {
  const bColor = opt.color || buildingColors[Math.floor(Math.random() * buildingColors.length)];
  const rColor = roofColors[Math.floor(Math.random() * roofColors.length)];

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color: bColor })
  );
  body.position.set(x, h / 2, z);
  body.castShadow = true;
  body.receiveShadow = true;
  scene.add(body);

  // Roof
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(w + 0.2, 0.3, d + 0.2),
    new THREE.MeshLambertMaterial({ color: rColor })
  );
  roof.position.set(x, h + 0.15, z);
  roof.castShadow = true;
  scene.add(roof);

  // Windows
  const wColor = accentColors[Math.floor(Math.random() * accentColors.length)];
  const rows = Math.floor(h / 2), cols = Math.floor(w / 1.5);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const win = new THREE.Mesh(
        new THREE.PlaneGeometry(0.5, 0.6),
        new THREE.MeshBasicMaterial({ color: wColor, transparent: true, opacity: 0.85 })
      );
      win.position.set(
        x - w / 2 + 0.9 + c * (w / cols),
        1.2 + r * 2,
        z + d / 2 + 0.01
      );
      scene.add(win);
      const win2 = win.clone();
      win2.position.z = z - d / 2 - 0.01;
      win2.rotation.y = Math.PI;
      scene.add(win2);
    }
  }
  // Door
  const door = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 1.4),
    new THREE.MeshBasicMaterial({ color: 0x8B5E3C })
  );
  door.position.set(x, 0.7, z + d / 2 + 0.02);
  scene.add(door);
}

// City blocks
const buildingDefs = [
  [-10, -10, 5, 8, 5], [-10, -10, 4, 5, 4],
  [10, -10, 5, 10, 5], [10, -10, 3.5, 6, 4],
  [-10, 10, 5, 7, 5], [-10, 10, 4, 12, 4],
  [10, 10, 5, 9, 5], [10, 10, 4, 5, 4],
  [-22, -10, 5, 11, 6], [-22, -10, 4, 7, 4],
  [22, -10, 5, 13, 6], [22, -10, 4, 6, 4],
  [-22, 10, 5, 8, 5], [22, 10, 5, 10, 5],
  [-10, -22, 6, 7, 5], [10, -22, 5, 9, 5],
  [-10, 22, 5, 6, 5], [10, 22, 6, 8, 5],
];
buildingDefs.forEach(args => makeBuilding(...args));

// ─── Trees ──────────────────────────────────────────────────────────────────
function makeTree(x, z, h = 3) {
  const trunkH = h * 0.4;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.18, trunkH, 7),
    new THREE.MeshLambertMaterial({ color: 0x7a4f2e })
  );
  trunk.position.set(x, trunkH / 2, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const foliageLevels = 3;
  for (let i = 0; i < foliageLevels; i++) {
    const r = (foliageLevels - i) * 0.55 + 0.3;
    const fh = r * 1.4;
    const fol = new THREE.Mesh(
      new THREE.ConeGeometry(r, fh, 8),
      new THREE.MeshLambertMaterial({ color: i === 0 ? 0x2d7a2d : i === 1 ? 0x3a9a3a : 0x4ab04a })
    );
    fol.position.set(x, trunkH + i * (fh * 0.5) + fh * 0.3, z);
    fol.castShadow = true;
    scene.add(fol);
  }
}

// Trees along streets and parks
const treePositions = [
  [6, -8], [6, -4], [6, 0], [6, 4], [6, 8],
  [-6, -8], [-6, -4], [-6, 0], [-6, 4], [-6, 8],
  [-4, 6], [0, 6], [4, 6], [-4, -6], [0, -6], [4, -6],
  // Park trees
  [-14, 0], [-15, 2], [-13, -2], [-16, -1],
  [14, 0], [15, 2], [13, -2],
  [0, -14], [2, -15], [-2, -13],
  [0, 14], [2, 15], [-2, 13],
  // Scattered
  [7, -14], [-7, -14], [7, 14], [-7, 14],
  [14, 7], [-14, 7], [14, -7], [-14, -7],
];
treePositions.forEach(([x, z]) => makeTree(x, z, 2.5 + Math.random() * 2));

// ─── Park / Fountain ────────────────────────────────────────────────────────
// Central park circle
const parkGrass = new THREE.Mesh(
  new THREE.CircleGeometry(4, 32),
  new THREE.MeshLambertMaterial({ color: 0x66bb66 })
);
parkGrass.rotation.x = -Math.PI / 2;
parkGrass.position.set(0, 0.03, 0);
scene.add(parkGrass);

// Fountain base
const fbMesh = new THREE.Mesh(
  new THREE.CylinderGeometry(1.2, 1.4, 0.4, 24),
  new THREE.MeshLambertMaterial({ color: 0xd0c8b8 })
);
fbMesh.position.set(0, 0.2, 0);
fbMesh.castShadow = true;
scene.add(fbMesh);

const fWater = new THREE.Mesh(
  new THREE.CylinderGeometry(1.0, 1.0, 0.1, 24),
  new THREE.MeshLambertMaterial({ color: 0x55aadd, transparent: true, opacity: 0.8 })
);
fWater.position.set(0, 0.42, 0);
scene.add(fWater);

const fPillar = new THREE.Mesh(
  new THREE.CylinderGeometry(0.12, 0.15, 1.2, 10),
  new THREE.MeshLambertMaterial({ color: 0xc8b8a8 })
);
fPillar.position.set(0, 1.0, 0);
scene.add(fPillar);

// Park benches
function bench(x, z, ry) {
  const g = new THREE.Group();
  const seat = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.08, 0.4), new THREE.MeshLambertMaterial({ color: 0x8B5E3C }));
  seat.position.y = 0.5; g.add(seat);
  const back = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 0.06), new THREE.MeshLambertMaterial({ color: 0x8B5E3C }));
  back.position.set(0, 0.75, -0.17); g.add(back);
  [[-0.5, 0], [0.5, 0]].forEach(([lx]) => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.5, 0.4), new THREE.MeshLambertMaterial({ color: 0x555555 }));
    leg.position.set(lx, 0.25, 0); g.add(leg);
  });
  g.rotation.y = ry;
  g.position.set(x, 0, z);
  g.castShadow = true;
  scene.add(g);
}
bench(2, 0, Math.PI / 2);
bench(-2, 0, -Math.PI / 2);
bench(0, 2, Math.PI);
bench(0, -2, 0);

// ─── Streetlamps ────────────────────────────────────────────────────────────
function lamp(x, z) {
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.08, 5, 8),
    new THREE.MeshLambertMaterial({ color: 0x3a3a3a })
  );
  pole.position.set(x, 2.5, z);
  pole.castShadow = true;
  scene.add(pole);
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.15, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xfff5aa })
  );
  head.position.set(x, 5.1, z);
  scene.add(head);
}
[
  [5.5,-8],[5.5,-4],[5.5,0],[5.5,4],[5.5,8],
  [-5.5,-8],[-5.5,-4],[-5.5,0],[-5.5,4],[-5.5,8],
  [-4,5.5],[0,5.5],[4,5.5],[-4,-5.5],[0,-5.5],[4,-5.5],
].forEach(([x,z]) => lamp(x,z));

// ─── Sky / Clouds ────────────────────────────────────────────────────────────
function cloud(x, y, z) {
  const g = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
  [[0,0,0,2],[2,0.3,0,1.5],[-1.5,0.2,0,1.6],[0.5,0.8,0,1.3]].forEach(([cx,cy,cz,r]) => {
    const s = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), mat);
    s.position.set(cx, cy, cz);
    g.add(s);
  });
  g.position.set(x, y, z);
  scene.add(g);
  return g;
}
const clouds = [];
clouds.push(cloud(-20, 22, -30));
clouds.push(cloud(15, 25, -20));
clouds.push(cloud(30, 20, 10));
clouds.push(cloud(-30, 23, 15));
clouds.push(cloud(5, 24, -40));
clouds.push(cloud(-10, 21, 35));

// ─── NPCs ───────────────────────────────────────────────────────────────────
const NPCS = [
  {
    name: "Alex — Guide",
    x: 0, z: 4,
    bodyColor: 0x3a9a3a,
    hairColor: 0xffd700,
    dialog: "Bienvenue dans ce portfolio interactif ! Explore la ville et parle aux habitants pour découvrir mes projets. Déplace-toi avec ZQSD et regarde autour avec la souris."
  },
  {
    name: "PNJ Projet",
    x: -5, z: 0,
    bodyColor: 0x4488cc,
    hairColor: 0xff9933,
    dialog: "Projet en attente... Les infos du portfolio seront ajoutées ici !"
  },
  {
    name: "PNJ Projet",
    x: 5, z: 0,
    bodyColor: 0xcc4444,
    hairColor: 0x88ddff,
    dialog: "Projet en attente... Les infos du portfolio seront ajoutées ici !"
  },
  {
    name: "PNJ Contact",
    x: 0, z: -5,
    bodyColor: 0xaa55cc,
    hairColor: 0xffeeaa,
    dialog: "Contact et liens en attente... Les infos seront ajoutées ici !"
  },
];

const npcObjs = [];
NPCS.forEach(npc => {
  const g = new THREE.Group();
  g.position.set(npc.x, 0, npc.z);

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.28, 0.32, 1.4, 10),
    new THREE.MeshLambertMaterial({ color: npc.bodyColor })
  );
  body.position.y = 0.7; body.castShadow = true; g.add(body);

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.29, 12, 12),
    new THREE.MeshLambertMaterial({ color: 0xffe0bd })
  );
  head.position.y = 1.6; head.castShadow = true; g.add(head);

  const hair = new THREE.Mesh(
    new THREE.SphereGeometry(0.31, 10, 8, 0, Math.PI * 2, 0, Math.PI * 0.5),
    new THREE.MeshLambertMaterial({ color: npc.hairColor })
  );
  hair.position.y = 1.74; g.add(hair);

  // Shadow circle under NPC
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(0.35, 16),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.18 })
  );
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.02;
  g.add(shadow);

  scene.add(g);
  npcObjs.push({ g, data: npc });
});

// ─── Player / Controls ──────────────────────────────────────────────────────
const player = { x: 0, z: 12, yaw: Math.PI, pitch: 0 };
const keys = {};
let locked = false, dialogOpen = false, nearNPC = null;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyE') {
    if (!dialogOpen && nearNPC) openDlg(nearNPC);
    else if (dialogOpen) closeDlg();
  }
  if (e.code === 'Escape' && dialogOpen) closeDlg();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === document.body;
  document.getElementById('crosshair').style.display = locked ? 'block' : 'none';
  document.getElementById('hud').style.display = locked ? 'block' : 'none';
  if (!locked && !dialogOpen) {
    document.getElementById('overlay').style.display = 'flex';
  }
});

document.addEventListener('mousemove', e => {
  if (!locked || dialogOpen) return;
  player.yaw -= e.movementX * 0.0022;
  player.pitch = Math.max(-1.2, Math.min(1.2, player.pitch - e.movementY * 0.0022));
});

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  document.body.requestPointerLock();
});

canvas.addEventListener('click', () => {
  if (!locked && !dialogOpen) {
    document.getElementById('overlay').style.display = 'none';
    document.body.requestPointerLock();
  }
});

function openDlg(npc) {
  dialogOpen = true;
  document.exitPointerLock();
  document.getElementById('dlg-name').textContent = npc.data.name;
  document.getElementById('dlg-text').textContent = npc.data.dialog;
  document.getElementById('dlg').style.display = 'block';
  document.getElementById('hint').style.display = 'none';
}
function closeDlg() {
  dialogOpen = false;
  document.getElementById('dlg').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  document.body.requestPointerLock();
}
document.getElementById('dlg-close').addEventListener('click', closeDlg);

// ─── Collision ──────────────────────────────────────────────────────────────
const colliders = [
  { x: -10, z: -10, w: 9, d: 9 },
  { x: 10, z: -10, w: 9, d: 9 },
  { x: -10, z: 10, w: 9, d: 9 },
  { x: 10, z: 10, w: 9, d: 9 },
  { x: -22, z: -10, w: 9, d: 10 },
  { x: 22, z: -10, w: 9, d: 10 },
  { x: -22, z: 10, w: 9, d: 10 },
  { x: 22, z: 10, w: 9, d: 10 },
  { x: -10, z: -22, w: 10, d: 9 },
  { x: 10, z: -22, w: 9, d: 9 },
  { x: -10, z: 22, w: 9, d: 9 },
  { x: 10, z: 22, w: 9, d: 9 },
];

function checkCollision(nx, nz) {
  const pr = 0.5;
  for (const col of colliders) {
    const hw = col.w / 2 + pr, hd = col.d / 2 + pr;
    if (nx > col.x - hw && nx < col.x + hw && nz > col.z - hd && nz < col.z + hd) return true;
  }
  return false;
}

// ─── Animation loop ─────────────────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.014;

  if (!dialogOpen && locked) {
    const sp = 0.1;
    const s = Math.sin(player.yaw), co = Math.cos(player.yaw);
    let nx = player.x, nz = player.z;
    if (keys['KeyW'] || keys['KeyZ']) { nx -= s * sp; nz -= co * sp; }
    if (keys['KeyS']) { nx += s * sp; nz += co * sp; }
    if (keys['KeyA'] || keys['KeyQ']) { nx -= co * sp; nz += s * sp; }
    if (keys['KeyD']) { nx += co * sp; nz -= s * sp; }
    nx = Math.max(-26, Math.min(26, nx));
    nz = Math.max(-26, Math.min(26, nz));
    if (!checkCollision(nx, nz)) { player.x = nx; player.z = nz; }
  }

  camera.position.set(player.x, 1.7, player.z);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  // Clouds drift
  clouds.forEach((c, i) => { c.position.x += 0.004 + i * 0.001; if (c.position.x > 50) c.position.x = -50; });

  // NPC — bob + look at player
  nearNPC = null;
  let minDist = 3.0;
  npcObjs.forEach((n, i) => {
    n.g.position.y = Math.sin(t * 1.3 + i * 1.1) * 0.06;
    n.g.lookAt(player.x, 1.6 + n.g.position.y, player.z);
    const dx = player.x - n.data.x, dz = player.z - n.data.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < minDist) { minDist = dist; nearNPC = n; }
  });

  const hint = document.getElementById('hint');
  if (!dialogOpen && locked) {
    if (nearNPC) {
      hint.style.display = 'block';
      hint.textContent = `Parler à ${nearNPC.data.name.split('—')[0].trim()} [E]`;
    } else {
      hint.style.display = 'none';
    }
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
